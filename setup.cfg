[flake8]
max-line-length = 100
extend-ignore = E203, W503
per-file-ignores =
    # The embedded vis-network template is a raw JS string that can't be reflowed.
    gradio_app.py:E501

# Some editors lint with pycodestyle directly (it ignores the [flake8] section).
[pycodestyle]
max-line-length = 100
ignore = E203, W503, E402, E501
